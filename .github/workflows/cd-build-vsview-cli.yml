name: Build vsview-cli
on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"

jobs:
  lint:
    uses: ./.github/workflows/ci-lint.yml
    with:
      package: vsview-cli
    secrets: inherit

  wheels:
    name: Build wheels (${{ matrix.os }})
    needs: [lint]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/vsview-cli/v')
        shell: uv run --no-sync --with toml-rs python {0}
        run: |
          import os
          import pathlib
          import toml_rs

          ref = os.environ.get("GITHUB_REF", "")
          version = ref[len("refs/tags/vsview-cli/v") :]

          print(f"Injecting version {version} into Cargo.toml")

          path = pathlib.Path("src/vsview-cli/rust/Cargo.toml")

          data = toml_rs.loads(path.read_text())
          data["package"]["version"] = version
          path.write_text(toml_rs.dumps(data))

      - name: Build sdist
        if: matrix.os == 'macos-latest'
        run: uv build --package vsview-cli --sdist --out-dir dist --clear

      - name: Upload sdist
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist
          path: dist/*.tar.gz

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4
        with:
          package-dir: src/vsview-cli
          output-dir: wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
