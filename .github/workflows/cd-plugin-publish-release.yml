name: Publish Plugin Release

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Tag and release
    if: >-
      github.event.pull_request.merged == true
      && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Generate release notes
        run: |
          python .github/scripts/detect_plugin_releases.py || exit_code=$?
          if [ "${exit_code:-0}" -ne 0 ] && [ "${exit_code:-0}" -ne 2 ]; then
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Parse and push release tag
        id: tag
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Expected title: "release: <plugin>/v<version>"
          tag="${PR_TITLE#release: }"

          if [ "$tag" = "$PR_TITLE" ]; then
            echo "Error: PR title does not start with 'release: '"
            exit 1
          fi

          # Extract plugin name
          plugin="${tag%%/v*}"
          echo "plugin=$plugin" >> "$GITHUB_OUTPUT"
          echo "full_tag=$tag" >> "$GITHUB_OUTPUT"

          python .github/scripts/push_release_tags.py "$tag" --notes-file ".github/releases/${plugin}.release.md"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.full_tag }}" \
            --title "${{ steps.tag.outputs.full_tag }}" \
            --notes-file ".github/releases/${{ steps.tag.outputs.plugin }}.release.md" \
            --latest=false

      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pypipublish.yml -f package=${{ steps.tag.outputs.plugin }} --ref ${{ steps.tag.outputs.full_tag }}

      - name: Post webhook for failure
        if: failure()
        uses: Jaded-Encoding-Thaumaturgy/discord-failure-notifier@fb70088dc5982abfac889fdded8603be4f5823b6 # v1
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
