name: Lint

on:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "**/pyproject.toml"
  pull_request:
    paths:
      - "**.py"
      - "**/pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_NO_SYNC: "1"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: 3.12
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --all-groups --all-packages --no-install-package vapoursynth

      - name: Run Ruff check
        id: ruff-check
        run: uv run ruff check .

      - name: Run Ruff format
        id: ruff-format
        if: success() || (failure() && steps.ruff-check.conclusion == 'failure')
        run: uv run ruff format --check --diff

      - name: Running mypy
        if: success() || (failure() && (steps.ruff-check.conclusion == 'failure' || steps.ruff-format.conclusion == 'failure'))
        run: uv run mypy .

      - name: Post webhook for failure
        if: failure()
        uses: Jaded-Encoding-Thaumaturgy/discord-failure-notifier@fb70088dc5982abfac889fdded8603be4f5823b6 # v1
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
