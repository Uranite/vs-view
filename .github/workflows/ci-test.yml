name: Tests

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "**/pyproject.toml"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "**/pyproject.toml"
      - ".github/workflows/test.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      package:
        description: "Package to test"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        vapoursynth-version: [73]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Set up VapourSynth ${{ matrix.vapoursynth-version }}
        uses: Jaded-Encoding-Thaumaturgy/setup-vapoursynth@e71ddd35a59836662e7df2c60490a586516d8384 # v1
        with:
          vapoursynth-version: ${{ matrix.vapoursynth-version }}
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libopengl0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-xtest0 \
            libxcb-cursor0 \
            libpulse0 \
            xvfb

      - name: Install dependencies
        run: uv sync --locked --group test --group plugins --no-dev

      - name: Set package argument
        id: setup-pkg
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            echo "package_arg=--package ${{ inputs.package }}" >> $GITHUB_OUTPUT
          else
            echo "package_arg=" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        env:
          QT_DEBUG_PLUGINS: 1
        run: uv run ${{ steps.setup-pkg.outputs.package_arg }} --no-sync pytest

      - name: Post webhook for failure
        if: failure()
        uses: Jaded-Encoding-Thaumaturgy/discord-failure-notifier@fb70088dc5982abfac889fdded8603be4f5823b6 # v1
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
