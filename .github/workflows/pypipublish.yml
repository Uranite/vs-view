name: Publish
on:
  push:
    tags:
      - "*/v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to build"
        required: true
        type: choice
        options:
          - vsview
          - vsview-cli
          - vspackrgb
          - audio-convert
          - comp
          - fftspectrum
          - frameprops-extended
          - split-planes

env:
  VSVIEW_PYTHON_VERSION: "3.14"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      build-workflow: ${{ steps.check.outputs.build-workflow }}
      python-version: ${{ env.VSVIEW_PYTHON_VERSION }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: check
        run: python .github/scripts/resolve_package.py
        env:
          INPUT_PACKAGE: ${{ inputs.package }}

  # Build Jobs
  python-build:
    needs: [prepare]
    if: needs.prepare.outputs.matrix != '[]'
    uses: ./.github/workflows/cd-build-python.yml
    with:
      matrix: ${{ needs.prepare.outputs.matrix }}
      python-version: ${{ needs.prepare.outputs.python-version }}

  vsview-cli-build:
    needs: [prepare]
    if: needs.prepare.outputs.build-workflow == 'vsview-cli'
    uses: ./.github/workflows/cd-build-vsview-cli.yml
    with:
      python-version: ${{ needs.prepare.outputs.python-version }}

  vspackrgb-build:
    needs: [prepare]
    if: needs.prepare.outputs.build-workflow == 'vspackrgb'
    uses: ./.github/workflows/cd-build-vspackrgb.yml
    with:
      python-version: ${{ needs.prepare.outputs.python-version }}

  # Publish Jobs
  python-publish:
    name: Publish ${{ matrix.package }} to PyPI
    needs: [prepare, python-build]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}

    environment:
      name: pypi-${{ matrix.package }}
      url: https://pypi.org/p/${{ matrix.package }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-${{ matrix.package }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Post webhook for failure
        if: failure()
        uses: Jaded-Encoding-Thaumaturgy/discord-failure-notifier@fb70088dc5982abfac889fdded8603be4f5823b6 # v1
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}

  vsview-cli-publish:
    name: Publish vsview-cli to PyPI
    needs: [prepare, vsview-cli-build]
    if: needs.prepare.outputs.build-workflow == 'vsview-cli'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment:
      name: pypi-vsview-cli
      url: https://pypi.org/p/vsview-cli

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ needs.prepare.outputs.python-version }}

      - name: Check the output
        run: uvx twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Post webhook for failure
        if: failure()
        uses: Jaded-Encoding-Thaumaturgy/discord-failure-notifier@fb70088dc5982abfac889fdded8603be4f5823b6 # v1
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}

  vspackrgb-publish:
    name: Publish vspackrgb to PyPI
    needs: [prepare, vspackrgb-build]
    if: needs.prepare.outputs.build-workflow == 'vspackrgb'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment:
      name: pypi-vspackrgb
      url: https://pypi.org/p/vspackrgb

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ needs.prepare.outputs.python-version }}

      - name: Check the output
        run: uvx twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Post webhook for failure
        if: failure()
        uses: Jaded-Encoding-Thaumaturgy/discord-failure-notifier@fb70088dc5982abfac889fdded8603be4f5823b6 # v1
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
